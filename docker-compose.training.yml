services:
  training:
    image: jupyter/scipy-notebook:python-3.11
    container_name: faultsense_training
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./notebook:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./models:/home/jovyan/models
      - ./outputs:/home/jovyan/outputs
      - ./requirements-dev.txt:/home/jovyan/requirements-dev.txt:ro
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    command: bash -c "pip install --no-cache-dir -r /home/jovyan/requirements-dev.txt && start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''"
    networks:
      - faultsense_net

networks:
  faultsense_net:
    driver: bridge
