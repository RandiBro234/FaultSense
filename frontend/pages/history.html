<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat — FaultSense</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS Files -->
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">

  <style>
    /* Page-specific styles untuk history */
    .page-header {
      margin-bottom: var(--space-xl);
    }

    .breadcrumb {
      font-size: var(--font-size-xs);
      color: var(--text-muted);
      margin-bottom: var(--space-sm);
    }

    .breadcrumb a {
      color: var(--text-muted);
      transition: color var(--transition-base);
    }

    .breadcrumb a:hover {
      color: var(--accent-blue);
    }

    .page-title {
      font-size: var(--font-size-3xl);
      margin-bottom: var(--space-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-tight);
    }

    .page-subtitle {
      color: var(--text-muted);
      font-size: var(--font-size-base);
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--space-md);
      margin-bottom: var(--space-xl);
    }

    .stat-card {
      background-color: var(--secondary-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
    }

    .stat-label {
      font-size: var(--font-size-xs);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: var(--font-weight-semibold);
      margin-bottom: var(--space-sm);
    }

    .stat-value {
      font-family: var(--font-serif);
      font-size: var(--font-size-3xl);
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-value.success {
      color: var(--success);
    }

    .stat-value.danger {
      color: var(--danger);
    }

    /* Filters Bar */
    .filters-bar {
      background-color: var(--secondary-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      display: flex;
      gap: var(--space-md);
      align-items: flex-end;
      flex-wrap: wrap;
      margin-bottom: var(--space-xl);
    }

    .filter-group {
      flex: 1;
      min-width: 140px;
    }

    .filter-label {
      display: block;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-xs);
    }

    /* Table Header */
    .table-header {
      padding: var(--space-lg);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-title {
      font-size: var(--font-size-sm);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      font-weight: var(--font-weight-semibold);
    }

    .table-count {
      font-size: var(--font-size-sm);
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    /* Probability Cell */
    .prob-cell {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .prob-mini-track {
      width: 60px;
      height: 4px;
      background-color: var(--primary-bg);
      border-radius: var(--radius-full);
      overflow: hidden;
      flex-shrink: 0;
    }

    .prob-mini-fill {
      height: 100%;
      border-radius: var(--radius-full);
    }

    /* Loading State */
    .loading-state {
      padding: var(--space-3xl);
      text-align: center;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .filters-bar {
        flex-direction: column;
        align-items: stretch;
      }

      .filter-group {
        min-width: 100%;
      }

      /* Hide beberapa kolom di mobile */
      .table thead th:nth-child(n+5),
      .table tbody td:nth-child(n+5) {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar akan di-render oleh JavaScript -->

  <div class="page-wrapper">
    <div class="page-content">

      <!-- Page Header -->
      <div class="page-header">
        <div class="breadcrumb">
          <a href="../index.html">Home</a> / Riwayat Prediksi
        </div>
        <h1 class="page-title">Riwayat Prediksi</h1>
        <p class="page-subtitle">
          Seluruh riwayat pengecekan kondisi mesin yang tersimpan di database.
        </p>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Ditampilkan</div>
          <div class="stat-value" id="statShown">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Normal</div>
          <div class="stat-value success" id="statNormal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Failure</div>
          <div class="stat-value danger" id="statFailure">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Failure Rate</div>
          <div class="stat-value" id="statRate">—</div>
        </div>
      </div>

      <!-- Filters Bar -->
      <div class="filters-bar">
        <div class="filter-group">
          <label class="filter-label">Status</label>
          <select id="filterStatus" class="form-select">
            <option value="">Semua</option>
            <option value="Normal">Normal</option>
            <option value="Failure">Failure</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Failure Type</label>
          <select id="filterType" class="form-select">
            <option value="">Semua</option>
            <option value="TWF">TWF</option>
            <option value="HDF">HDF</option>
            <option value="PWF">PWF</option>
            <option value="OSF">OSF</option>
            <option value="RNF">RNF</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Limit</label>
          <select id="filterLimit" class="form-select">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="500">500</option>
          </select>
        </div>

        <button class="btn btn-primary" id="btnFilter">
          Terapkan Filter
        </button>

        <button class="btn btn-secondary" id="btnReset">
          Reset
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <div class="table-header">
          <h2 class="table-title">Data Riwayat</h2>
          <span class="table-count" id="tableCount">—</span>
        </div>
        <div id="tableBody">
          <div class="loading-state">Memuat data...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer akan di-render oleh JavaScript -->

  <!-- JavaScript Modules -->
  <script type="module">
    import { renderNavbarForPages } from '../components/navbar.js';
    import { renderFooter } from '../components/footer.js';
    import { API_BASE_URL, formatDateTime, getProbabilityColor, getStatusBadgeClass } from '../scripts/main.js';

    // Render navbar dan footer
    renderNavbarForPages('history');
    renderFooter();

    // Load history on page load
    loadHistory();

    // Event listeners
    document.getElementById('btnFilter').addEventListener('click', loadHistory);
    document.getElementById('btnReset').addEventListener('click', resetFilters);

    // Load history function
    async function loadHistory() {
      const status = document.getElementById('filterStatus').value;
      const failureType = document.getElementById('filterType').value;
      const limit = document.getElementById('filterLimit').value;

      let url = `${API_BASE_URL}/history?limit=${limit}`;
      if (status) url += `&status=${status}`;
      if (failureType) url += `&failure_type=${failureType}`;

      document.getElementById('tableBody').innerHTML = '<div class="loading-state">Memuat data...</div>';

      try {
        const response = await fetch(url);
        const data = await response.json();
        renderTable(data);
      } catch (error) {
        document.getElementById('tableBody').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <p class="empty-state-text">Tidak dapat terhubung ke API.</p>
          </div>
        `;
      }
    }

    // Render table function
    function renderTable(data) {
      // Calculate stats
      const normal = data.filter(d => d.status === 'Normal').length;
      const failure = data.filter(d => d.status === 'Failure').length;
      const rate = data.length > 0 ? ((failure / data.length) * 100).toFixed(1) : 0;

      // Update stats
      document.getElementById('statShown').textContent = data.length;
      document.getElementById('statNormal').textContent = normal;
      document.getElementById('statFailure').textContent = failure;
      document.getElementById('statRate').textContent = rate + '%';
      document.getElementById('tableCount').textContent = `${data.length} record`;

      // Empty state
      if (data.length === 0) {
        document.getElementById('tableBody').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p class="empty-state-text">Belum ada data prediksi.</p>
          </div>
        `;
        return;
      }

      // Generate table rows
      const rows = data.map(d => {
        const prob = d.probability_failure;
        const probPct = Math.round(prob * 100);
        const color = getProbabilityColor(prob);
        const badgeClass = getStatusBadgeClass(d.status);

        const ftTag = d.failure_type
          ? `<span class="badge badge-neutral">${d.failure_type}</span>`
          : '<span style="color:var(--text-muted)">—</span>';

        return `
          <tr>
            <td class="font-mono">${d.id}</td>
            <td><span class="badge ${badgeClass}">${d.status}</span></td>
            <td>${ftTag}</td>
            <td>
              <div class="prob-cell">
                <div class="prob-mini-track">
                  <div class="prob-mini-fill" style="width:${probPct}%;background-color:${color}"></div>
                </div>
                <span class="font-mono text-secondary">${prob.toFixed(4)}</span>
              </div>
            </td>
            <td class="font-mono">${d.type}</td>
            <td class="font-mono">${d.air_temperature?.toFixed(1)}</td>
            <td class="font-mono">${d.torque?.toFixed(1)}</td>
            <td class="font-mono">${d.tool_wear}</td>
            <td class="text-muted" style="font-size:var(--font-size-xs)">${formatDateTime(d.checked_at)}</td>
          </tr>
        `;
      }).join('');

      // Render table
      document.getElementById('tableBody').innerHTML = `
        <table class="table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Status</th>
              <th>Failure Type</th>
              <th>Probabilitas</th>
              <th>Type</th>
              <th>Air Temp</th>
              <th>Torque</th>
              <th>Tool Wear</th>
              <th>Waktu</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    // Reset filters function
    function resetFilters() {
      document.getElementById('filterStatus').value = '';
      document.getElementById('filterType').value = '';
      document.getElementById('filterLimit').value = '50';
      loadHistory();
    }
  </script>
</body>
</html>
