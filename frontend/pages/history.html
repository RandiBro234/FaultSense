<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat — FaultSense</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- CSS Files -->
  <link rel="stylesheet" href="../styles/variables.css">
  <link rel="stylesheet" href="../styles/global.css">
  <link rel="stylesheet" href="../styles/layout.css">
  <link rel="stylesheet" href="../styles/components.css">
  <link rel="stylesheet" href="../styles/history.css">
</head>
<body>

  <!-- Navbar akan di-render oleh JavaScript -->

  <div class="page-wrapper">
    <div class="page-content">

      <!-- Page Header -->
      <div class="page-header">
        <div class="breadcrumb">
          <a href="../index.html">Home</a> / Riwayat Prediksi
        </div>
        <h1 class="page-title">Riwayat Prediksi</h1>
        <p class="page-subtitle">
          Seluruh riwayat pengecekan kondisi mesin yang tersimpan di database.
        </p>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Ditampilkan</div>
          <div class="stat-value" id="statShown">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Normal</div>
          <div class="stat-value success" id="statNormal">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Failure</div>
          <div class="stat-value danger" id="statFailure">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Failure Rate</div>
          <div class="stat-value" id="statRate">—</div>
        </div>
      </div>

      <!-- Filters Bar -->
      <div class="filters-bar">
        <div class="filter-group">
          <label class="filter-label">Status</label>
          <select id="filterStatus" class="form-select">
            <option value="">Semua</option>
            <option value="Normal">Normal</option>
            <option value="Failure">Failure</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Failure Type</label>
          <select id="filterType" class="form-select">
            <option value="">Semua</option>
            <option value="TWF">TWF</option>
            <option value="HDF">HDF</option>
            <option value="PWF">PWF</option>
            <option value="OSF">OSF</option>
            <option value="RNF">RNF</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Limit</label>
          <select id="filterLimit" class="form-select">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
            <option value="500">500</option>
          </select>
        </div>

        <button class="btn btn-primary" id="btnFilter">
          Terapkan Filter
        </button>

        <button class="btn btn-secondary" id="btnReset">
          Reset
        </button>
      </div>

      <!-- Table -->
      <div class="table-wrapper">
        <div class="table-header">
          <h2 class="table-title">Data Riwayat</h2>
          <span class="table-count" id="tableCount">—</span>
        </div>
        <div id="tableBody">
          <div class="loading-state">Memuat data...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer akan di-render oleh JavaScript -->

  <!-- JavaScript Modules -->
  <script type="module" src="../scripts/history.js"></script>
</body>
</html>
