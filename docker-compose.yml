services:
  postgres:
    image: postgres:15
    container_name: faultsense_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-faultsense_db}
      POSTGRES_USER: ${POSTGRES_USER:-faultsense_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-faultsense_pass}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-faultsense_user} -d ${POSTGRES_DB:-faultsense_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: faultsense_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Hostname `postgres` adalah service name di network ini.
      DATABASE_URL: ${DATABASE_URL:-postgresql://faultsense_user:faultsense_pass@postgres:5432/faultsense_db}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
