version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: faultsense_postgres
    restart: always
    environment:
      POSTGRES_DB: faultsense_db
      POSTGRES_USER: faultsense_user
      POSTGRES_PASSWORD: faultsense_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faultsense_user -d faultsense_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: faultsense_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  postgres_data:
